[package]
name = "keystone-exporter"
version = "0.0.0"
edition = "2021"
description = "An HPC telemetry agent designed for the Keystone platform."
license = "LicenseRef-Proprietary"

[dependencies]
arc-swap = "1.9.0"
axum = "0.8.8"
clap = { version = "4.5.60", features = ["derive"] }
fern = { version = "0.7", features = ["syslog-7"] }
gethostname = "1.1.0"
log = "0.4.27"
nvml-wrapper = "0.12.0"
sysinfo = "0.38.2"
syslog = "7.0.0"
tokio = { version = "1.50.0", features = ["rt-multi-thread", "macros", "net"] }

[profile.release]
codegen-units = 1
lto = true
opt-level = 3
panic = "abort"
strip = true

[package.metadata.generate-rpm]
assets = [
    { source = "target/release/keystone-exporter", dest = "/usr/bin/keystone-exporter", mode = "755" },
]
